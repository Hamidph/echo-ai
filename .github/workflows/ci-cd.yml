name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Run tests and linting
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run ruff linter
        run: uv run ruff check backend/

      - name: Run ruff formatter check
        run: uv run ruff format --check backend/

      - name: Run mypy type checker
        run: uv run mypy backend/
        continue-on-error: true  # Don't fail build on type errors initially

      - name: Run pytest
        run: uv run pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term
        continue-on-error: true  # Don't fail initially while building test suite

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Job 2: Build Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ai-visibility-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: false
          tags: ai-visibility-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Railway deploys automatically from main via GitHub integration
